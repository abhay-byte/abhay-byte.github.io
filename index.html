<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abhay — Agentic Software Engineer</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f0f;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .container { text-align: center; max-width: 480px; }
    img.avatar { width: 96px; height: 96px; border-radius: 50%; margin-bottom: 1.5rem; border: 2px solid #2a2a2a; }
    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; color: #fff; }
    p.bio { font-size: 0.9rem; color: #888; margin-bottom: 2rem; line-height: 1.5; }
    .links { display: flex; flex-direction: column; gap: 0.75rem; }
    .links a {
      display: block;
      padding: 1rem;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      color: #e0e0e0;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 500;
      transition: all 0.2s;
    }
    .links a:hover { background: #222; border-color: #444; transform: translateY(-1px); }
    .links a .sub { font-size: 0.8rem; color: #666; font-weight: 400; margin-top: 2px; }
  </style>
</head>
<body>
  <div class="container">
    <img class="avatar" src="favicon.png" alt="Abhay">
    <h1>@abhay-byte</h1>
    <p class="bio">Agentic Software Engineer — I build software with AI agents.</p>
    <div class="links">
      <a href="https://github.com/abhay-byte">
        GitHub Profile
        <div class="sub">github.com/abhay-byte</div>
      </a>
      <a href="https://github.com/abhay-byte/abhay-kb">
        Knowledge Base
        <div class="sub">github.com/abhay-byte/abhay-kb</div>
      </a>
    </div>
  </div>
</body>
</html>
